<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300" role="img" aria-label="hive.">
  <title>hive.</title>
  <defs>
    <linearGradient id="honeyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7ba54"/>
      <stop offset="1" stop-color="#c79a3a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e7ba54" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#e7ba54" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.2"/>
    </filter>
    <pattern id="combs" width="42" height="24" patternUnits="userSpaceOnUse" patternTransform="translate(0,0)">
      <path d="M10.5 0 L21 6 L21 18 L10.5 24 L0 18 L0 6 Z M31.5 0 L42 6 L42 18 L31.5 24 L21 18 L21 6 Z"
        fill="none" stroke="#e7ba54" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="0.5" y="0.5" width="899" height="299" rx="22" fill="#0c0b08"/>
  <rect x="0.5" y="0.5" width="899" height="299" rx="22" fill="url(#combs)"/>
  <rect x="0.5" y="0.5" width="899" height="299" rx="22" fill="none" stroke="#2a2416" stroke-width="1"/>

  <!-- honey glow behind the mark (decorative; rests visible) -->
  <ellipse cx="232.7" cy="150.0" rx="150" ry="120" fill="url(#glow)">
    <animate attributeName="rx" values="142;166;142" dur="6s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" keyTimes="0;0.5;1"/>
    <animate attributeName="opacity" values="0.8;1;0.8" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- honeycomb mark: fully visible at rest, subtle continuous loop -->
  <g transform="translate(178.98,98.00) scale(1.6774)">
    <g>
      <!-- slow vertical bob (local mark units) -->
      <animateTransform attributeName="transform" type="translate"
        values="0 1.8;0 -1.8;0 1.8" dur="7s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" keyTimes="0;0.5;1"/>
      <!-- top hex: outlined, gentle stroke shimmer -->
      <polygon points="32,6 43.3,12.5 43.3,25.5 32,32 20.7,25.5 20.7,12.5"
        fill="none" stroke="#e7ba54" stroke-width="3.4" stroke-linejoin="round">
        <animate attributeName="stroke-opacity" values="1;0.55;1" dur="4.2s" repeatCount="indefinite"/>
      </polygon>
      <!-- bottom-left filled hex: honey shimmer -->
      <polygon points="18,30 29.3,36.5 29.3,49.5 18,56 6.7,49.5 6.7,36.5" fill="url(#honeyGrad)">
        <animate attributeName="opacity" values="1;0.7;1" dur="4.2s" begin="0s" repeatCount="indefinite"/>
      </polygon>
      <!-- bottom-right filled hex: offset shimmer (pulse travels across the comb) -->
      <polygon points="46,30 57.3,36.5 57.3,49.5 46,56 34.7,49.5 34.7,36.5" fill="url(#honeyGrad)">
        <animate attributeName="opacity" values="1;0.7;1" dur="4.2s" begin="2.1s" repeatCount="indefinite"/>
      </polygon>
    </g>
  </g>

